services:
  postgres:
    image: postgres:16
    container_name: uber_etl_postgres
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: warehouse
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d

  python-etl:
    build:
      context: .
      dockerfile: etl/Dockerfile
    container_name: uber_etl_python
    environment:
      MARKET_API_URL: https://api.binance.com/api/v3/klines
      MARKET_SYMBOL: BTCUSDT
      MARKET_INTERVAL: 1h
      MARKET_LIMIT: 300
      USE_KAFKA: "false"
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: market-candles
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: warehouse
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      SAMPLE_OUT: /workspace/data/sample/market_prices.csv
    depends_on:
      - postgres

  adminer:
    image: adminer:4
    container_name: uber_etl_adminer
    ports:
      - "8082:8080"
    depends_on:
      - postgres

  metabase:
    image: metabase/metabase:v0.50.29
    container_name: uber_etl_metabase
    ports:
      - "3002:3000"
    depends_on:
      - postgres

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: uber_etl_zookeeper
    profiles: ["kafka"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: uber_etl_kafka
    profiles: ["kafka"]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: uber_etl_kafka_ui
    profiles: ["kafka"]
    depends_on:
      - kafka
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
  postgres_data:
